<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harvest Table Food Bank — Thank-You Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Caveat:wght@500;600&display=swap');

  :root {
    --bg: #202b24;
    --bg-panel: #26332a;
    --paper: #f5efe0;
    --ink: #ede6d6;
    --ink-dim: #a9b6aa;
    --gold: #d1a54b;
    --rust: #b5623a;
    --line: #3b4b3f;
    --paper-ink: #2b2620;
    --paper-ink-dim: #6b6151;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px; }

  header { margin-bottom: 32px; border-bottom: 1px solid var(--line); padding-bottom: 24px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 8px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .sub { color: var(--ink-dim); font-size: 14.5px; max-width: 560px; line-height: 1.5; margin: 0; }

  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 28px; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

  .ledger-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin: 0 0 12px;
    display: flex;
    justify-content: space-between;
  }

  .rows { display: flex; flex-direction: column; gap: 2px; }

  .row {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-left: 3px solid transparent;
    padding: 13px 14px;
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 4px;
    text-align: left;
    width: 100%;
    font-family: inherit;
    color: inherit;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .row:hover { background: #2c3b31; }
  .row.active { border-left-color: var(--gold); background: #2c3b31; }

  .row-name { font-weight: 600; font-size: 14.5px; }
  .row-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-dim); grid-column: 1 / 2; margin-top: 2px; }
  .row-amount { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--gold); }

  .stamp-mini {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    border: 1px solid;
    display: inline-block;
    margin-top: 6px;
  }
  .stamp-mini.first { color: var(--gold); border-color: var(--gold); }
  .stamp-mini.repeat { color: var(--rust); border-color: var(--rust); }

  .note-panel { min-height: 460px; display: flex; align-items: flex-start; justify-content: center; padding-top: 4px; }

  .empty-state {
    width: 100%;
    height: 420px;
    border: 1.5px dashed var(--line);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink-dim);
    font-size: 14.5px;
    padding: 40px;
  }

  .note {
    background: var(--paper);
    color: var(--paper-ink);
    width: 100%;
    max-width: 560px;
    padding: 40px 44px 36px;
    border-radius: 2px;
    box-shadow: 0 18px 40px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.04);
    transform: rotate(-0.4deg);
    position: relative;
  }

  .note-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--paper-ink-dim);
    display: flex;
    justify-content: space-between;
    margin-bottom: 22px;
    border-bottom: 1px solid rgba(43,38,32,0.15);
    padding-bottom: 14px;
  }

  .note-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1.5px solid;
    padding: 3px 8px;
    border-radius: 20px;
    transform: rotate(-4deg);
  }
  .note-badge.first { color: var(--gold); border-color: var(--gold); }
  .note-badge.repeat { color: var(--rust); border-color: var(--rust); }

  .note h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    margin: 0 0 18px;
  }

  .note p { line-height: 1.65; font-size: 15px; margin: 0 0 15px; }
  .note p:last-of-type { margin-bottom: 0; }

  .sign-off {
    margin-top: 26px;
    font-family: 'Caveat', cursive;
    font-size: 26px;
    color: var(--paper-ink);
  }
  .sign-role {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--paper-ink-dim);
    margin-top: -6px;
  }

  footer { margin-top: 40px; border-top: 1px solid var(--line); padding-top: 18px; }
  .footer-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">Harvest Table Food Bank</p>
    <h1>Thank-You Ledger</h1>
    <p class="sub">Click any donor to generate their thank-you note — pulled straight from what they actually gave, not a form letter.</p>
  </header>

  <div class="layout">
    <div>
      <p class="ledger-title"><span>Donors</span><span id="countLabel"></span></p>
      <div class="rows" id="rows"></div>
    </div>

    <div class="note-panel" id="notePanel">
      <div class="empty-state">Select a donor from the ledger to see their note.</div>
    </div>
  </div>

  <footer>
    <p class="footer-label">Portfolio demo — sample data, not real donors</p>
  </footer>

</div>

<script>
  const donors = [
    { name: "Maria Torres", amount: 50, program: "Weekend Backpack Program", type: "first-time" },
    { name: "James Whitfield", amount: 500, program: "Mobile Pantry", type: "repeat" },
    { name: "Aisha Bello", amount: 25, program: "Emergency Food Boxes", type: "first-time" },
    { name: "Robert Chen", amount: 1200, program: "Senior Grocery Delivery", type: "repeat" },
    { name: "Linda Okafor", amount: 75, program: "Community Garden", type: "repeat" },
    { name: "David Kim", amount: 30, program: "Weekend Backpack Program", type: "first-time" },
    { name: "Patricia Sullivan", amount: 300, program: "Mobile Pantry", type: "first-time" },
    { name: "Marcus Webb", amount: 150, program: "Emergency Food Boxes", type: "repeat" }
  ];

  const programImpact = {
    "Weekend Backpack Program": "sends food home with kids in our Weekend Backpack Program so their weekend doesn't start with an empty cupboard",
    "Mobile Pantry": "keeps our Mobile Pantry van rolling into neighborhoods that don't have a grocery store nearby",
    "Emergency Food Boxes": "stocks Emergency Food Boxes for families who need food on the table the same day trouble hits",
    "Senior Grocery Delivery": "delivers groceries straight to the door of a senior who can no longer get to the store easily",
    "Community Garden": "grows fresh vegetables in our Community Garden for families who rarely see produce like that in their kitchen"
  };

  function sizeTier(amount) {
    if (amount < 75) return "small";
    if (amount < 300) return "medium";
    return "large";
  }

  function buildMessage(d) {
    const meals = Math.round(d.amount * 3);
    const impact = programImpact[d.program];
    const tier = sizeTier(d.amount);
    const amountStr = "$" + d.amount.toLocaleString();

    let opening, closing;

    if (d.type === "first-time") {
      opening = `This is the first gift we've ever received from you, and we wanted you to hear it from a real person and not just an automated receipt: thank you.`;
    } else {
      opening = `You've given to Harvest Table before, and here you are again. That kind of steady support is rare, and it doesn't go unnoticed on our end.`;
    }

    const middle = `Your gift of ${amountStr} ${impact}. By our rough math, that puts about ${meals} meals on tables this month.`;

    if (d.type === "first-time" && tier === "small") {
      closing = `We hope this is the start of something, not a one-time thing. We'll keep you posted on what your support makes possible, and if you're ever curious what this looks like in person, we'd love to have you out for a volunteer morning.`;
    } else if (d.type === "first-time" && tier === "medium") {
      closing = `We'd genuinely love to show you around sometime, so you can see exactly where this went. New supporters who jump in at this level tend to become some of our favorite regulars.`;
    } else if (d.type === "first-time" && tier === "large") {
      closing = `A first gift at this level doesn't happen often, and it didn't go past us unnoticed. Priya, our Executive Director, would like the chance to thank you herself — expect a short call or note from her soon.`;
    } else if (d.type === "repeat" && tier === "small") {
      closing = `Gifts like yours, given again and again, are what let us plan ahead instead of scrambling week to week. Thank you for being someone we can count on.`;
    } else if (d.type === "repeat" && tier === "medium") {
      closing = `We're grateful you keep choosing to grow this with us — supporters who come back are the backbone of what we can promise our neighbors year-round.`;
    } else {
      closing = `Support at this level, given more than once, puts you in a small circle of people who make our biggest plans possible. We'd love to have you at this year's Harvest Table Impact Dinner so you can see exactly where it's going.`;
    }

    return { opening, middle, closing };
  }

  const rowsEl = document.getElementById("rows");
  const notePanel = document.getElementById("notePanel");
  const countLabel = document.getElementById("countLabel");
  countLabel.textContent = donors.length + " total";

  donors.forEach((d, i) => {
    const row = document.createElement("button");
    row.className = "row";
    row.id = "row-" + i;
    row.innerHTML = `
      <div>
        <div class="row-name">${d.name}</div>
        <div class="row-meta">${d.program}</div>
        <span class="stamp-mini ${d.type === 'first-time' ? 'first' : 'repeat'}">${d.type === 'first-time' ? 'First gift' : 'Returning'}</span>
      </div>
      <div class="row-amount">$${d.amount.toLocaleString()}</div>
    `;
    row.addEventListener("click", () => selectDonor(i));
    rowsEl.appendChild(row);
  });

  function selectDonor(i) {
    document.querySelectorAll(".row").forEach(r => r.classList.remove("active"));
    document.getElementById("row-" + i).classList.add("active");

    const d = donors[i];
    const msg = buildMessage(d);
    const firstName = d.name.split(" ")[0];
    const isFirst = d.type === "first-time";

    notePanel.innerHTML = `
      <div class="note">
        <div class="note-mark">
          <span>Harvest Table Food Bank</span>
          <span class="note-badge ${isFirst ? 'first' : 'repeat'}">${isFirst ? 'First-time giver' : 'Returning giver'}</span>
        </div>
        <h2>Dear ${firstName},</h2>
        <p>${msg.opening}</p>
        <p>${msg.middle}</p>
        <p>${msg.closing}</p>
        <div class="sign-off">With gratitude,</div>
        <div class="sign-role">The Harvest Table Team</div>
      </div>
    `;
  }

  selectDonor(0);
</script>
</body>
</html>
